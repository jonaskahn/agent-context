<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#2a1660"/>
    </linearGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="2" y="2" width="116" height="116" rx="22" fill="url(#bg)" stroke="#3730a3" stroke-width="1.5"/>

  <!-- Outer ring edges -->
  <g stroke="#4f46e5" stroke-width="1.2" stroke-opacity="0.28">
    <line x1="60" y1="18" x2="96" y2="39"/>
    <line x1="96" y1="39" x2="96" y2="81"/>
    <line x1="96" y1="81" x2="60" y2="102"/>
    <line x1="60" y1="102" x2="24" y2="81"/>
    <line x1="24" y1="81" x2="24" y2="39"/>
    <line x1="24" y1="39" x2="60" y2="18"/>
  </g>

  <!-- Hub spokes -->
  <g stroke="#6366f1" stroke-width="1.8" stroke-opacity="0.55">
    <line x1="60" y1="60" x2="60" y2="18"/>
    <line x1="60" y1="60" x2="96" y2="39"/>
    <line x1="60" y1="60" x2="96" y2="81"/>
    <line x1="60" y1="60" x2="60" y2="102"/>
    <line x1="60" y1="60" x2="24" y2="81"/>
    <line x1="60" y1="60" x2="24" y2="39"/>
  </g>

  <!-- Outer nodes -->
  <g fill="url(#node)">
    <circle cx="60" cy="18"  r="6.5"/>
    <circle cx="96" cy="39"  r="6.5"/>
    <circle cx="96" cy="81"  r="6.5"/>
    <circle cx="60" cy="102" r="6.5"/>
    <circle cx="24" cy="81"  r="6.5"/>
    <circle cx="24" cy="39"  r="6.5"/>
  </g>

  <!-- Hub node — outer glow ring -->
  <circle cx="60" cy="60" r="16" fill="#6366f1" opacity="0.22"/>
  <!-- Hub node — filled -->
  <circle cx="60" cy="60" r="12" fill="url(#hub)"/>
  <!-- Hub node — inner highlight -->
  <circle cx="60" cy="60" r="6.5" fill="#c7d2fe"/>
</svg>
